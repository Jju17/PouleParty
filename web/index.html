<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <meta name="darkreader-lock" />
    <title>Poule Party</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta property="og:title" content="Poule Party" />
    <meta property="og:description" content="A real-world GPS hide-and-seek game. One player is the Chicken, the rest are Hunters!" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Poule Party" />
    <meta name="twitter:description" content="A real-world GPS hide-and-seek game." />
    <meta name="twitter:image" content="/icon-512.png" />
  </head>
  <body>
    <script>
      // Sync dark class before React renders to avoid flash of wrong theme
      (function(){var t=localStorage.getItem("theme");var d=t==="dark"||(t!=="light"&&matchMedia("(prefers-color-scheme:dark)").matches);if(d)document.documentElement.classList.add("dark")})();
      // PP-99: pin <html lang> to the URL prefix before React boots so
      // screen readers + no-JS crawlers see the right locale on first
      // paint. React's <I18nProvider> re-applies it post-hydration.
      (function(){var s=location.pathname.split("/")[1];if(s==="fr"||s==="en"||s==="nl")document.documentElement.lang=s})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
